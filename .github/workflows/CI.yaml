# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    # The branches below must be a subset of the branches above
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-2025

    # Any commit that contains [build] will now trigger these jobs, everything else will be skipped.
    # if: "contains(github.event.head_commit.message, '[build]')"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $BuildVersion = "${{ github.ref_name }}".Substring(1);
          echo "BuildVersion=$BuildVersion" >> $env:GITHUB_ENV
          echo $BuildVersion

      - name: Diagnose WDK Toolset
        shell: cmd
        run: |
          echo === VCToolsInstallDir ===
          echo %VCToolsInstallDir%

          echo === VS Install Path (vswhere) ===
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSINSTALLPATH=%%i"
          echo %VSINSTALLPATH%

          echo === WDK PlatformToolset directories ===
          dir "%VSINSTALLPATH%\MSBuild\Microsoft\VC\v170\Platforms\x64\PlatformToolsets\WindowsKernelModeDriver10.0\" 2>nul || echo "WindowsKernelModeDriver10.0 NOT found under VS MSBuild path"

          echo === WDK Registry Key ===
          reg query "HKLM\SOFTWARE\Microsoft\Windows Kits\Installed Roots" /v KitsRoot10 2>nul || echo "KitsRoot10 registry key NOT found"

          echo === WDK km include ===
          dir "C:\Program Files (x86)\Windows Kits\10\Include\10.0.26100.0\km\fltKernel.h" 2>nul || echo "fltKernel.h NOT found at expected path"

          echo === WDK build props ===
          dir "C:\Program Files (x86)\Windows Kits\10\build\10.0.26100.0\WindowsDriver.KernelMode.props" 2>nul || echo "WindowsDriver.KernelMode.props NOT found"

          echo === Installed VS workloads (WDK related) ===
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Component.WDK -property installationPath 2>nul || echo "WDK workload component NOT found in VS"

          echo === MSBuild location ===
          where msbuild 2>nul || echo "msbuild not found in PATH"

      - name: Build
        shell: cmd
        run: |
          .\BuildAllTargets.cmd

      - name: Test
        shell: cmd
        run: |
          setlocal enabledelayedexpansion
          for %%c in (Debug Release) do (
            for %%p in (x86 x64) do (
              if exist "Output\Binaries\%%c\%%p\Musa.CoreLite.Test.exe" (
                echo Running Output\Binaries\%%c\%%p\Musa.CoreLite.Test.exe
                "Output\Binaries\%%c\%%p\Musa.CoreLite.Test.exe" || exit /B 1
              )
            )
          )

      - name: Build NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # github的内置版本有Bug，此行必须添加，否则无法获得内容
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*

          $releaseNotes = & git tag -l --format='%(contents)' $env:GITHUB_REF.Remove(0, 10)
          $content = [System.IO.File]::ReadAllText("Musa.CoreLite.NuGet\Musa.CoreLite.nuspec")

          $releaseNotesToken = '$releaseNotes$'
          $releaseNotesIndex = $content.IndexOf($releaseNotesToken)

          if($releaseNotesIndex -ne -1)
          {
            echo $content.Substring(0, $releaseNotesIndex) | out-file "Musa.CoreLite.NuGet\Musa.CoreLite-New.nuspec" -NoNewline
            echo $releaseNotes | out-file "Musa.CoreLite.NuGet\Musa.CoreLite-New.nuspec" -Append
            echo $content.Remove(0, $releaseNotesIndex + $releaseNotesToken.Length) | out-file "Musa.CoreLite.NuGet\Musa.CoreLite-New.nuspec" -NoNewline -Append
          }

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          if "${{ env.BuildVersion }}" NEQ "" (
              NuGet pack .\Musa.CoreLite.NuGet\Musa.CoreLite-New.nuspec -Properties version=${{env.BuildVersion}};commit=%GITHUB_SHA%
          )
          if %ERRORLEVEL% NEQ 0 exit /B %ERRORLEVEL%

      - name: Package a zip
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{github.workspace}}
        shell: cmd
        run: 7z a -tzip Musa.CoreLite.zip Publish\

      - name: Publish NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        shell: cmd
        run: |
          NuGet push Musa.CoreLite.${{env.BuildVersion}}.nupkg -ApiKey ${{ secrets.NUGET_TOKEN }} -Source https://api.nuget.org/v3/index.json
          if %ERRORLEVEL% NEQ 0 exit /B %ERRORLEVEL%

      - name: Publish
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            Musa.CoreLite.zip
            *.nupkg